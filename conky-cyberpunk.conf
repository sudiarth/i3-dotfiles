conky.config = {
    -- Window
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'override',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    -- Position & Size
    alignment = 'top_right',
    gap_x = 40,
    gap_y = 40,
    minimum_width = 320,
    maximum_width = 320,
    minimum_height = 0,

    -- Font & Drawing
    use_xft = true,
    font = 'Poppins:size=9',
    xftalpha = 0.9,
    override_utf8_locale = true,
    uppercase = false,
    use_spacer = 'none',

    -- Colors
    default_color = '00ffd5',          -- cyan
    color0 = 'ff2079',                 -- hot pink
    color1 = '00ffd5',                 -- neon cyan
    color2 = 'b967ff',                 -- neon purple
    color3 = 'fffc58',                 -- neon yellow
    color4 = '05d9e8',                 -- electric blue
    color5 = '434c5e',                 -- dim line color
    color6 = 'ff6ac1',                 -- pink
    color7 = 'd8dee9',                 -- light gray text
    color8 = '01c8ee',                 -- sky cyan
    color9 = 'ff3860',                 -- red/alert

    -- Performance
    update_interval = 3,
    double_buffer = true,
    no_buffers = true,
    cpu_avg_samples = 4,
    net_avg_samples = 2,
    text_buffer_size = 2048,

    -- Bars
    default_bar_width = 240,
    default_bar_height = 3,

    -- Graph
    default_graph_width = 240,
    default_graph_height = 30,

    -- Draw
    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    draw_graph_borders = false,
};

conky.text = [[
${color0}${font Poppins:bold:size=14}SYSTEM ${color5}${hr 1}${font}
${color5}─────────────────────────────────────────${color}
${color4}  HOST ${alignr}${color7}${nodename}
${color4}  OS ${alignr}${color7}${sysname} ${kernel}
${color4}  UPTIME ${alignr}${color7}${uptime_short}
${color4}  PACKAGES ${alignr}${color7}${execi 3600 dpkg -l | grep -c '^ii'}

${color0}${font Poppins:bold:size=14}CPU ${color5}${hr 1}${font}
${color5}─────────────────────────────────────────${color}
${color6}  ${freq_g}GHz${alignr}${color3}${cpu}%${color}
${color8}${cpugraph 30,300 05d9e8 ff2079 -t}
${color4}  CORE 1 ${color1}${cpubar cpu1 3,240}${alignr}${color3}${cpu cpu1}%
${color4}  CORE 2 ${color1}${cpubar cpu2 3,240}${alignr}${color3}${cpu cpu2}%
${color4}  CORE 3 ${color1}${cpubar cpu3 3,240}${alignr}${color3}${cpu cpu3}%
${color4}  CORE 4 ${color1}${cpubar cpu4 3,240}${alignr}${color3}${cpu cpu4}%
${color4}  CORE 5 ${color1}${cpubar cpu5 3,240}${alignr}${color3}${cpu cpu5}%
${color4}  CORE 6 ${color1}${cpubar cpu6 3,240}${alignr}${color3}${cpu cpu6}%
${color4}  CORE 7 ${color1}${cpubar cpu7 3,240}${alignr}${color3}${cpu cpu7}%
${color4}  CORE 8 ${color1}${cpubar cpu8 3,240}${alignr}${color3}${cpu cpu8}%
${color4}  TEMP ${alignr}${color9}${hwmon 4 temp 1}°C

${color0}${font Poppins:bold:size=14}MEMORY ${color5}${hr 1}${font}
${color5}─────────────────────────────────────────${color}
${color4}  RAM ${color2}${membar 3,240}${alignr}${color3}${memperc}%
${color7}  ${mem} / ${memmax}
${color4}  SWAP ${color2}${swapbar 3,240}${alignr}${color3}${swapperc}%

${color0}${font Poppins:bold:size=14}DISK ${color5}${hr 1}${font}
${color5}─────────────────────────────────────────${color}
${color4}  / ${color6}${fs_bar 3,240 /}${alignr}${color3}${fs_used_perc /}%
${color7}  ${fs_used /} / ${fs_size /}
${color4}   READ ${alignr}${color7}${diskio_read}
${color4}   WRITE ${alignr}${color7}${diskio_write}

${color0}${font Poppins:bold:size=14}NETWORK ${color5}${hr 1}${font}
${color5}─────────────────────────────────────────${color}
${color4}  SSID ${alignr}${color7}${wireless_essid wlp2s0}
${color4}  SIGNAL ${alignr}${color3}${wireless_link_qual_perc wlp2s0}%
${color4}   UP ${alignr}${color1}${upspeed wlp2s0}
${color4}   DN ${alignr}${color6}${downspeed wlp2s0}
${color8}${downspeedgraph wlp2s0 25,145 05d9e8 b967ff -t} ${color6}${upspeedgraph wlp2s0 25,145 ff6ac1 ff2079 -t}

${color0}${font Poppins:bold:size=14}GPU ${color5}${hr 1}${font}
${color5}─────────────────────────────────────────${color}
${color4}  RTX 3050 Ti
${color4}  TEMP ${alignr}${color9}${execi 10 nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader}°C
${color4}  UTIL ${alignr}${color3}${execi 10 nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader}
${color4}  VRAM ${alignr}${color7}${execi 10 nvidia-smi --query-gpu=memory.used --format=csv,noheader} / ${execi 60 nvidia-smi --query-gpu=memory.total --format=csv,noheader}
${color4}  POWER ${alignr}${color3}${execi 10 nvidia-smi --query-gpu=power.draw --format=csv,noheader}

${color0}${font Poppins:bold:size=14}PROCESSES ${color5}${hr 1}${font}
${color5}─────────────────────────────────────────${color}
${color4}  NAME ${alignr} CPU   MEM${color}
${color7}  ${top name 1} ${alignr}${color3}${top cpu 1}% ${color2}${top mem 1}%
${color7}  ${top name 2} ${alignr}${color3}${top cpu 2}% ${color2}${top mem 2}%
${color7}  ${top name 3} ${alignr}${color3}${top cpu 3}% ${color2}${top mem 3}%
${color7}  ${top name 4} ${alignr}${color3}${top cpu 4}% ${color2}${top mem 4}%
${color7}  ${top name 5} ${alignr}${color3}${top cpu 5}% ${color2}${top mem 5}%
${color5}─────────────────────────────────────────${color}
${color4}  TOTAL ${alignr}${color3}${processes} ${color4}processes
${color5}═════════════════════════════════════════${color}
]];
