;==========================================================
;  Polybar config - Dracula theme for i3
;==========================================================

[colors]
background = #1a1a2e
background-alt = #282a36
foreground = #f8f8f2
foreground-alt = #888888
primary = #bd93f9
secondary = #6272a4
alert = #ff5555
green = #50fa7b
cyan = #8be9fd
orange = #ffb86c
pink = #ff79c6
yellow = #f1fa8c

;----------------------------------------------------------
; BAR: top-external (HDMI-A-0)
;----------------------------------------------------------
[bar/top-external]
monitor = HDMI-A-0
width = 100%
height = 28
radius = 0
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
line-color = ${colors.primary}

border-bottom-size = 1
border-bottom-color = ${colors.secondary}

padding-left = 1
padding-right = 2

module-margin-left = 1
module-margin-right = 1

font-0 = monospace:size=10;2
font-1 = FontAwesome:size=10;2

modules-left = i3
modules-center = date
modules-right = pulseaudio memory cpu wlan battery tray

cursor-click = pointer
cursor-scroll = ns-resize

override-redirect = false

;----------------------------------------------------------
; BAR: top-laptop (eDP)
;----------------------------------------------------------
[bar/top-laptop]
monitor = eDP
width = 100%
height = 28
radius = 0
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
line-color = ${colors.primary}

border-bottom-size = 1
border-bottom-color = ${colors.secondary}

padding-left = 1
padding-right = 2

module-margin-left = 1
module-margin-right = 1

font-0 = monospace:size=10;2
font-1 = FontAwesome:size=10;2

modules-left = i3
modules-center = date
modules-right = pulseaudio memory cpu battery

cursor-click = pointer
cursor-scroll = ns-resize

override-redirect = false

;----------------------------------------------------------
; MODULES
;----------------------------------------------------------

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false
pin-workspaces = true

label-mode-padding = 2
label-mode-foreground = ${colors.foreground}
label-mode-background = ${colors.alert}

; focused = Active workspace on focused monitor
label-focused = %index%
label-focused-background = ${colors.secondary}
label-focused-foreground = ${colors.foreground}
label-focused-underline = ${colors.primary}
label-focused-padding = 2

; unfocused = Inactive workspace on any monitor
label-unfocused = %index%
label-unfocused-padding = 2
label-unfocused-foreground = ${colors.foreground-alt}

; visible = Active workspace on unfocused monitor
label-visible = %index%
label-visible-background = ${colors.background-alt}
label-visible-underline = ${colors.secondary}
label-visible-padding = 2

; urgent = Workspace with urgency hint set
label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.cyan}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 3
format-prefix = "RAM "
format-prefix-foreground = ${colors.orange}
label = %percentage_used:2%%

[module/wlan]
type = internal/network
interface-type = wireless
interval = 3
format-connected = <label-connected>
label-connected = "W %essid%"
label-connected-foreground = ${colors.green}
format-disconnected = <label-disconnected>
label-disconnected = "W --"
label-disconnected-foreground = ${colors.foreground-alt}

[module/eth]
type = internal/network
interface-type = wired
interval = 3
format-connected = <label-connected>
label-connected = "E %local_ip%"
label-connected-foreground = ${colors.green}
format-disconnected =

[module/date]
type = internal/date
interval = 1
date = "%a %b %d"
time = "%H:%M"
label = "%date%  %time%"
label-foreground = ${colors.foreground}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
label-volume = "VOL %percentage%%"
label-volume-foreground = ${colors.pink}
label-muted = "MUTED"
label-muted-foreground = ${colors.foreground-alt}
click-right = pavucontrol

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC0
full-at = 98

[module/tray]
type = internal/tray
tray-padding = 2

format-charging = <label-charging>
label-charging = "CHG %percentage%%"
label-charging-foreground = ${colors.green}

format-discharging = <label-discharging>
label-discharging = "BAT %percentage%%"
label-discharging-foreground = ${colors.yellow}

format-full = <label-full>
label-full = "FULL"
label-full-foreground = ${colors.green}

[settings]
screenchange-reload = true

[global/wm]
margin-top = 0
margin-bottom = 0
